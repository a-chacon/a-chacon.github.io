    - Rails
    - Tailwindcss
    - Docker
- es:
    title: Iamindexed
    description: Una pequeña app que te ayuda haciendo Scraping en diferentes motores de búsqueda para saber si tu sitio está indexado o no. La idea nace de la necesidad de buscar de forma rápida si mis sitios estaban indexados o no. 
  en:
    title: Iamindexed
    description: A small app that helps you Scraping in different search engines to know if your site is indexed or not. The idea comes from the need to quickly find out if my sites were indexed or not.
  image: assets/images/iamindexed.jpg
  github: https://github.com/a-chacon/iamindexed
  web: https://iamindexed.com
  tags:
    - Rails
    - Tailwindcss
    - Docker

- es:
    title: AcogerEs
    description: Un panel de administración para manejar datos sobre familias de acogidas para la Fundación AcogerEs. El proyecto contemplaba la depuración y carga de datos de más de dos mil familias junto a una campana de publicidad mediante correo.
  en:
    title: AcogerEs
    description: An administration panel to manage data on foster families for Fundación AcogerEs. The project included data cleansing and uploading of more than two thousand families and a mailing campaign.
  image: assets/images/acogeres.png
  tags:
    - Rails
    - Bootstrap
    - AWS
- es:
    title: Minitest-cc
    description: Plug-in para el Framework de tests unitarios Minitest. Muestra información respecto a la cobertura que tienen los tests sobre el código del paquete o aplicación. Una opción mucho más simple a SimpleCov.
  en:
    title: Minitest-cc
    description: Plug-in for the Minitest unit test framework. Displays information about the coverage of the tests on the package or application code. A much simpler option to SimpleCov.
  image: assets/images/minitestscc.png
  github: https://github.com/a-chacon/minitest-cc
  web: https://rubygems.org/gems/minitest-cc
  tags:
    - Ruby
    - Minitest
- es:
    title: RailsUrlShortener
    description: Motor para Rails que añade la funcionalidad completa para cortar URLs. Simplemente con instalar esta gema en alguna aplicación hecha con Rails puedes comenzar a cortar URLs y obtener información útil sobre su uso (ip, geolocalización, dispositivo, etc.). 
  en:
    title: RailsUrlShortener
    description: Engine for Rails that adds full URL-slicing functionality. By simply installing this gem in any Rails application you can start URL slicing and get useful information about its usage (ip, geolocation, device, etc.).
  image: assets/images/ruby.webp
  github: https://github.com/a-chacon/rails-url-shortener
  web: https://rubygems.org/gems/rails_url_shortener
  tags:
    - Ruby
    - Rails

