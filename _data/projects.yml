- es:
    title: Paso App
    description: Un cortador de URL que además puede recolectar información sobre los visitantes. Este proyecto está hecho utilizando mi otro proyecto open-source RailsUrlShortener y solo tiene el propósito de mostrar su implementación.
  en:
    title: Paso App
    description: A URL shortener that can also collect information about visitors. This project is made using my other open-source project RailsUrlShortener and is only intended to show its implementation..
