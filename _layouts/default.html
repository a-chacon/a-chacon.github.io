<!DOCTYPE html>
<html lang="{{ page.lang | default: "en-US" }}">

<head>
  <!-- General tags -->
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta charset="utf-8">
  <title>{{ page.title }}</title>
  <meta name="description" content="{{ page.excerpt | default: page.description }}">
  <meta name=”robots” content="index, follow">
  <meta http-equiv="Content-Language" content="{{site.active_lang}}">
  <link rel="alternate"
      hreflang="{{site.default_lang}}"
      href='{{site.url}}{{page.url | replace: "en", ""}}' />
  {% for lang in site.languages %}
  {% if lang == site.default_lang %}
    {% continue %}
  {% endif %}
  <link rel="alternate"
      hreflang="{{lang}}"
      href='{{site.url}}/{{lang}}{{page.url | replace: "en", ""}}' />
  {% endfor %}
  <link rel="canonical" href="{{ site.url }}{{ page.url | replace:'index.html',''}}">
  <!-- Favicon tags -->
  <link rel="icon" type="image/x-icon" href="/assets/images/favicon.ico">
  <!-- Opengraph tags -->
  <meta property="og:title" content="{{ page.title }} - {{ site.title }}" />
  <meta property="twitter:title" content="{{ page.title }} - {{ site.title }}" />
  <meta property="og:url" content="https://a-chacon.com/{{ page.title }}" />
  <meta property="og:image" content="{{ page.image  | absolute_url | default: '/assets/images/mysite.png'| absolute_url }}" />
  <meta property="twitter:image" content="{{ page.image  | absolute_url | default: '/assets/images/mysite.png'| absolute_url }}" />
  <meta property="og:type" content="website" />
  <meta property="og:description" content="{{ page.excerpt | default: page.description }}" />
  <meta property="twitter:description" content="{{ page.excerpt | default: page.description }}" />
  <!-- Style tags -->
  <link rel="stylesheet" href="{{ '/assets/css/application.css' | relative_url }}">
  <script src="https://unpkg.com/typewriter-effect@2.19.0/dist/core.js"></script>
  <!-- RSS -->
  <link rel="alternate" type="application/rss+xml" href="{{ site.url }}/feed.xml" />

  <script data-host="https://app.microanalytics.io" data-dnt="false" src="https://app.microanalytics.io/js/script.js" id="ZwSg9rf6GA" async defer></script>
</head>

<body class="bg-neutral-50">
  {% if page.lang == "es" %}
    {% include navbar_es.html %}
  {% else %}
    {% include navbar_en.html%}
  {% endif %}
  {{ content }}

  <!-- Carbon Neutral Website Banner (light) -->
  <div class="flex justify-center" >
    <a href="https://carbonneutralwebsite.org/" target="_blank" rel="noreferrer"><img src="https://carbonneutralwebsite.org/api/banner/a-chacon.com/14.76mg/light.svg" width="300px"  alt="Carbon impact of this web page" /></a>
  </div>

  {% include social_media_share.html %}

  <div id="up-button" class="fixed bottom-5 right-5 p-2 text-white rounded-full shadow-md cursor-pointer transition duration-300 ease-in-out" style="display: none;">
    <a href="#top">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="black" class="w-6 h-6">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 10l7-7m0 0l7 7m-7-7v18"></path>
      </svg>
    </a>
  </div>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      var upButton = document.getElementById('up-button');

      // Function to handle scroll event
      function handleScroll() {
        if (window.scrollY > 100) {
          upButton.style.display = 'block'; // Show the button when scrolled down
        } else {
          upButton.style.display = 'none'; // Hide the button when at the top
        }
      }

      // Add scroll event listener
      window.addEventListener('scroll', handleScroll);

      // Initial check to show/hide the button based on initial scroll position
      handleScroll();

      // Add click event listener to scroll to the top when the button is clicked
      upButton.addEventListener('click', function(e) {
        e.preventDefault();
        window.scrollTo({
          top: 0,
          behavior: 'smooth'
        });
      });
    });
  </script>
</body>

</html>
