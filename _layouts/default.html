<!DOCTYPE html>
<html lang="{{ site.lang | default: "en-US" }}">

<head>
  <!-- General tags -->
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta charset="utf-8">
  <title>{{ page.title }} - {{ site.title }}</title>
  <meta name="description" content="This is the andre's boring personal website. Back-end developer interested in create and learn.">
  <!-- Opengraph tags -->
  <meta property="og:title" content="{{ page.title }} - {{ site.title }}" />
  <meta property="og:url" content="https://a-chacon.com/{{ page.title }}" />
  <meta property="og:image" content="https://a-chacon.com/assets/images/mysite.png" />
  <meta property="og:type" content="website" />
  <meta property="og:description" content="This is the andre's boring personal website. Back-end developer interested in create and learn." />
  <!-- Style tags -->
  <link rel="stylesheet" href="{{ "/assets/css/application.css" | relative_url }}">
  <!-- Script tags -->
  <script type="module">
    import { Application, Controller } from "https://unpkg.com/@hotwired/stimulus/dist/stimulus.js"
    window.Stimulus = Application.start()

    Stimulus.register("enter", class extends Controller {
      static targets = [ "body", "buttom" ]
      connect() {
        console.log("Enter controller")
        setTimeout( () => { this.visible() } , 3000);
      }

      visible(){
        this.bodyTarget.classList.add('fadeIn')
        this.bodyTarget.classList.remove('invisible')
        this.buttomTarget.classList.add('invisible')
      }
    })
  </script>
</head>

<body class="bg-cover bg-center" style="background-image: url('/assets/images/bg.png')" data-controller="enter" data-action="keydown@window->enter#visible touchstart@window->enter#visible" >
  <div class="flex justify-center items-center h-screen">
    <div class="rounded-md w-100 lg:w-8/12 xl:lg:w-6/12 max-h-screen drop-shadow-2xl shadow-2xl">
      {% include top_bar.html %}
      <div class="bg-black/70 max-h-[92vh] overflow-auto">
        <div class="space-y-4 px-2 py-6">
          <div class="flex justify-between text-white text-xl">
            <div class="">
              <p class="text-green-500 font-semibold inline-block pr-2">root@host:~$</p> {{ page.command }}
            </div>
            <div class="pr-5" data-enter-target="buttom">
              <img src="/assets/images/enter.png" alt="enter buttom" class="h-8 w-30 animate-bounce">
            </div>
          </div>
          <div data-enter-target="body" class="invisible">
            {{ content }}
            <div class="text-white text-xl">
              <p class="text-green-500 font-semibold inline-block pr-2">root@host:~$</p>
            </div>
          </div>
        </div>
      </div>
      {% include buttom_bar.html %}
    </div>
  </div>
</body>

</html>
