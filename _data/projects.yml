- es:
    title: Iamindexed
    description: Una práctica app que agiliza el Scraping en diversos motores de búsqueda para verificar la indexación de tu sitio. Surgida de mi necesidad personal por comprobar rápidamente la indexación de mis sitios.
  en:
    title: Iamindexed
    description: A small app that helps you Scraping in different search engines to know if your site is indexed or not. The idea comes from the need to quickly find out if my sites were indexed or not.
