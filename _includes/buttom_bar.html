<div class="h-8 text-center text-white bg-zinc-700 rounded-b-md">
  <ul class="flex flex-wrap ml-2 h-full">
    {% for page_obj in site.data.pages %}
      {% if page.title == page_obj.name %}
        <li class=" border-t border-green-300 text-green-300 hover:bg-zinc-800 rounded-b">
          <a href="{{ page_obj.path }}" class="m-2">{{ page_obj.name }}</a>
        </li>
      {% else %}
        <li class=" border-t border-zinc-700 hover:bg-zinc-800 hover:border-zinc-800 rounded-b">
          <a href="{{ page_obj.path }}" class="m-2">{{ page_obj.name }}</a>
        </li>
      {% endif %}
    {% endfor %}
</div>
